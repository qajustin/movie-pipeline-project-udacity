name: Backend Continuous Deployment

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.10"
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: udacity-project4
  ECR_REGISTRY: 669172573612.dkr.ecr.us-east-1.amazonaws.com
  REPO_NAME: backend
  IMAGE_TAG: latest
  BACKEND_DIR: starter/backend
  K8S_DIR: starter/backend/k8s

jobs:
  lint:
    name: Run Lint
    runs-on: ubuntu-latest
    environment: Development Environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lint Dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install pipenv flake8

      - name: Execute Lint
        working-directory: ${{ env.BACKEND_DIR }}
        run: pipenv run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Test Dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install pipenv flake8
          pipenv install pytest

      - name: Execute Tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: pipenv run test

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs:
      - lint
      - test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          docker build \
            --build-arg=REACT_APP_MOVIE_API_URL=http://localhost:5000 \
            --tag $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Deploy to Amazon EKS
        working-directory: ${{ env.K8S_DIR }}
        run: |
          kustomize edit set image backend=$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
          kustomize build | kubectl apply -f -