name: Backend Continuous Deployment

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
      - name: Check the Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        working-directory: starter/backend
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --dev

      - name: Run Lint
        working-directory: starter/backend
        run: pipenv run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check the Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        working-directory: starter/backend
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --dev

      - name: Run Tests
        working-directory: starter/backend
        run: pipenv run test

  build-and-deploy:
    needs: [linting, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      EKS_CLUSTER_NAME: udacity-project5
      ECR_REGISTRY: 057024489761.dkr.ecr.us-east-1.amazonaws.com/backend
      REPO_NAME: backend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Check the Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        working-directory: starter/backend
        run: |
          docker build -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG .

      - name: Push Docker Image
        run: |
          docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Verify Cluster Access
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Install Kustomize
        run: |
          KUSTOMIZE_VERSION="5.4.2"
          curl -Lo kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          chmod +x kustomize
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Deploy to EKS
        working-directory: starter/backend/k8s
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
          kubectl config current-context
          kubectl get nodes
          kustomize edit set image backend=$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
          kustomize build | kubectl apply --validate=false -f -
