
name: Backend Continuous Integration

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'starter/backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Cache pipenv virtualenv
        uses: actions/cache@v3
        with:
          path: ~/.local/share/virtualenvs
          key: pipenv-${{ runner.os }}-${{ hashFiles('starter/backend/Pipfile.lock') }}
          restore-keys: pipenv-${{ runner.os }}-
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        working-directory: starter/backend
        run: pipenv install --dev
      - name: Run lint
        working-directory: starter/backend
        run: pipenv run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Cache pipenv virtualenv
        uses: actions/cache@v3
        with:
          path: ~/.local/share/virtualenvs
          key: pipenv-${{ runner.os }}-${{ hashFiles('starter/backend/Pipfile.lock') }}
          restore-keys: pipenv-${{ runner.os }}-
      - name: Install pipenv
        run: pip install pipenv
      - name: Install dependencies
        working-directory: starter/backend
        run: pipenv install --dev
      - name: Run tests
        working-directory: starter/backend
        run: pipenv run test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Build Docker image
        working-directory: starter/backend
        run: docker build --tag=mp-backend:latest .
