name: Frontend Continuous Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  NODE_VERSION: 18
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: udacity-project4
  ECR_REGISTRY: 669172573612.dkr.ecr.us-east-1.amazonaws.com
  REPO_NAME: frontend
  IMAGE_TAG: latest
  FRONTEND_DIR: starter/frontend
  K8S_DIR: starter/frontend/k8s

jobs:
  lint:
    name: Run Lint
    runs-on: ubuntu-latest
    environment: Development Environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Run Lint
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Run Tests
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run test

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs:
      - lint
      - test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          docker build \
            --build-arg=REACT_APP_MOVIE_API_URL=http://localhost:5000 \
            --tag $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Deploy to Amazon EKS
        working-directory: ${{ env.K8S_DIR }}
        run: |
          kustomize edit set image frontend=$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG
          kustomize build | kubectl apply -f -