name: Frontend Continuous Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  Linting:
    runs-on: ubuntu-latest
    environment: Development Environment

    steps:
      - name: Check the Repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: starter/frontend/package-lock.json

      - name: Install Dependencies
        working-directory: starter/frontend
        run: npm ci

      - name: Run Lint
        working-directory: starter/frontend
        run: npm run lint

  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Check the Repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: starter/frontend/package-lock.json

      - name: Install Dependencies
        working-directory: starter/frontend
        run: npm ci

      - name: Run Tests
        working-directory: starter/frontend
        run: npm run test

  Build:
    needs: [Linting, Test]
    runs-on: ubuntu-latest
    environment: Development Environment

    env:
      AWS_REGION: us-east-1
      ECR_REGISTRY: 057024489761.dkr.ecr.us-east-1.amazonaws.com
      REPO_NAME: frontend
      IMAGE_TAG: latest
      CLUSTER_NAME: cluster

    steps:
      - name: Check the Repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: starter/frontend/package-lock.json

      # ✅ DEBUG (very helpful)
      - name: Debug values
        run: |
          echo "ECR_REGISTRY=$ECR_REGISTRY"
          echo "REPO_NAME=$REPO_NAME"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        working-directory: starter/frontend
        run: |
          docker build \
            --build-arg REACT_APP_MOVIE_API_URL=http://localhost:5000 \
            -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG .

      - name: Push Docker Image
        run: |
          docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG

      - name: Configure Kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION



       - name: Deploy to Kubernetes
        working-directory: starter/frontend/k8s
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kustomize edit set image frontend=$ECR_REGISTRY/frontend:$IMAGE_TAG
          kustomize build | kubectl apply -f -

